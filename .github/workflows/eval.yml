name: LLM Eval CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      with_generation:
        description: "Run the full Self-RAG generation eval (requires SELFRAG_MODEL_PATH / a cached model)"
        type: boolean
        default: false

jobs:
  unit-tests:
    name: Guardrails & self-healing unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          pip install pytest pyyaml numpy langgraph requests

      - name: Run guardrails + self-healing + LLM API tests
        run: python -m pytest tests/test_guardrails.py tests/test_self_healing_graph.py tests/test_evaluation_metrics.py tests/test_llm_api_inference.py -v

  retrieval-eval:
    name: Retrieval quality gate (precision@k / recall@k / MRR / latency)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-eval-${{ hashFiles('requirements.txt') }}

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: ${{ runner.os }}-st-minilm

      - name: Install eval dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install sentence-transformers faiss-cpu pyyaml numpy tqdm pytest

      - name: Run retriever unit tests (isolation / no cross-request contamination)
        run: python -m pytest tests/test_retriever.py -v

      - name: Run golden-dataset retrieval eval
        run: |
          python -m src.evaluation.run_eval \
            --sample-size 100 \
            --k-values 1 3 5 \
            --max-hallucination-rate 1.0 \
            --max-latency-p95-seconds 3.0 \
            --output eval_report.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json

  full-generation-eval:
    name: Full Self-RAG generation eval (manual, hallucination rate + faithfulness)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' && inputs.with_generation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install full dependencies
        run: pip install -r requirements.txt

      - name: Run full eval (requires SELFRAG_MODEL_PATH to point at a cached model)
        env:
          SELFRAG_MODEL_PATH: ${{ vars.SELFRAG_MODEL_PATH }}
        run: |
          python -m src.evaluation.run_eval \
            --with-generation \
            --sample-size 100 \
            --max-hallucination-rate 0.05 \
            --max-latency-p95-seconds 5.0 \
            --min-faithfulness 0.7 \
            --output eval_report_full.json

      - name: Upload full eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-eval-report
          path: eval_report_full.json
